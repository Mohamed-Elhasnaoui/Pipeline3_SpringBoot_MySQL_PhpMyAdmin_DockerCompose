# Docker Compose 
version: '3.3'

# Define services
services:
  # spring service
  spring:
    image: amsibcgos
    ports:
      - "8888:8100"
    container_name: amsibcgos_cont
    depends_on:
      - database
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/amsibcgosdb?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: dhia
      SPRING_DATASOURCE_PASSWORD: dhiasaria123
    networks:
      - spr_net3

  # Database Service (Mysql)
  database:
    image: mysql:latest
    container_name: amsibcgos_mysql_cont
    volumes:
      - db_ams_v3:/var/lib/mysql 
    restart: always
    environment:
      MYSQL_DATABASE: amsibcgosdb
      MYSQL_USER: dhia
      MYSQL_PASSWORD: dhiasaria123
      MYSQL_ROOT_PASSWORD: root
    networks:
      - spr_net3

  # phpmyadmin Service 
  phpmyadmin:
    image: phpmyadmin
    container_name: amsibcgos_pmadmin_cont
    depends_on:
      - database
    restart: always
    ports:
      - 8088:80
    environment:
      - PMA_ARBITRARY=1
    networks:
      - spr_net3

# Dec
volumes:
  db_ams_v3:

networks:
  spr_net3:


